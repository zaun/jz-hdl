name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yosys build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld bison flex \
            libreadline-dev gawk tcl-dev libffi-dev git graphviz \
            xdot pkg-config python3 libboost-system-dev \
            libboost-python-dev libboost-filesystem-dev zlib1g-dev

      - name: Build and install yosys v0.63
        run: |
          git clone --depth 1 --branch v0.63 https://github.com/YosysHQ/yosys.git /tmp/yosys
          cd /tmp/yosys
          make -j$(nproc) PREFIX=/usr/local
          sudo make install PREFIX=/usr/local

      - name: Configure
        run: cmake -S compiler -B compiler/build -DBUILD_TESTING=ON -DJZ_HDL_WERROR=ON

      - name: Build
        run: cmake --build compiler/build

      - name: Unit tests (CTest)
        run: ctest --test-dir compiler/build --output-on-failure

      - name: Validation and golden tests
        run: bash compiler/tests/run_validation.sh
